<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="layout/header :: head"></th:block>
</head>
<body>
    <th:block th:replace="layout/header :: navbar"></th:block>

    <div class="container mt-4">
        <div class="row">
            <!-- Movie Poster -->
            <div class="col-md-4 mb-4">
                <img th:src="${movie.posterUrl != null ? movie.posterUrl : 'https://via.placeholder.com/400x600?text=No+Poster'}" 
                     class="img-fluid rounded shadow" alt="Movie Poster">
            </div>
            
            <!-- Movie Info -->
            <div class="col-md-8">
                <h1 class="mb-3" th:text="${movie.title}">Movie Title</h1>
                <div class="d-flex gap-2 mb-3">
                    <span class="badge bg-primary fs-6">Action</span>
                    <span class="badge bg-secondary fs-6"><i class="fas fa-clock me-1"></i><span th:text="${movie.duration + ' min'}">120 min</span></span>
                    <span class="badge bg-danger fs-6">18+</span>
                </div>
                <p class="lead text-muted" th:text="${movie.description}">Description</p>
                <p><strong>Director:</strong> <span>Christopher Nolan</span></p>
                <p><strong>Cast:</strong> <span>Cillian Murphy, Emily Blunt</span></p>
                <p><strong>Release Date:</strong> <span>01/01/2026</span></p>

                <hr class="border-secondary my-4">

                <!-- Showtimes -->
                <h3 class="mb-3"><i class="fas fa-calendar-alt text-primary me-2"></i>Showtimes</h3>
                
                <div th:if="${showtimes.empty}" class="alert alert-dark border-secondary">
                    No showtimes available for this movie.
                </div>
                
                <div th:unless="${showtimes.empty}" class="d-flex flex-wrap gap-3">
                    <div th:each="showtime : ${showtimes}" class="card border-secondary text-center" style="width: 140px; background-color: #2a2a2a;">
                        <div class="card-header border-secondary bg-dark text-light p-2">
                            <small th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy')}">01/01</small>
                        </div>
                        <div class="card-body p-2">
                            <h5 class="card-title text-primary mb-1" th:text="${#temporals.format(showtime.startTime, 'HH:mm')}">14:00</h5>
                            <p class="card-text small text-muted mb-2" th:text="${showtime.roomName}">Room 1</p>
                            <a th:href="@{/booking/showtime/{id}(id=${showtime.id})}" class="btn btn-sm btn-outline-danger w-100">Select</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="layout/footer :: footer"></th:block>
</body>
</html>
