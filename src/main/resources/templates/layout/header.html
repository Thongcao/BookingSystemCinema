<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookingSystemCinema</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #1a1a1a; color: #f8f9fa; }
        .navbar { background-color: #000; border-bottom: 2px solid #e50914; }
        .navbar-brand { color: #e50914 !important; font-weight: bold; font-size: 1.5rem; }
        .card { background-color: #2a2a2a; color: white; border: none; }
        .btn-primary { background-color: #e50914; border-color: #e50914; }
        .btn-primary:hover { background-color: #b20710; border-color: #b20710; }
        .text-primary { color: #e50914 !important; }
    </style>
</head>
<body>
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg navbar-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="/"><i class="fas fa-film me-2"></i>CinemaBooking</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item">
                            <a class="nav-link" href="/">Now Showing</a>
                        </li>

                        <!-- Guest: Show Login -->
                        <li class="nav-item" id="navLogin">
                            <a class="nav-link" href="/login">
                                <i class="fas fa-sign-in-alt me-1"></i>Login
                            </a>
                        </li>

                        <!-- Logged In: Show User Dropdown -->
                        <li class="nav-item dropdown d-none" id="navUser">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle me-1"></i>
                                <span id="navUsername">User</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                                <li><span class="dropdown-item-text text-muted small" id="navRole">Role</span></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <script>
            (function() {
                const token = localStorage.getItem('jwt_token');
                const username = localStorage.getItem('username');
                const role = localStorage.getItem('user_role');

                if (token && username) {
                    document.getElementById('navLogin').classList.add('d-none');
                    document.getElementById('navUser').classList.remove('d-none');
                    document.getElementById('navUsername').textContent = username;
                    document.getElementById('navRole').textContent = role === 'ADMIN' ? 'Admin' : 'Customer';
                }
            })();

            function logout() {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('user_id');
                localStorage.removeItem('username');
                localStorage.removeItem('user_role');
                window.location.href = '/login';
            }
        </script>
    </div>
</body>
</html>
