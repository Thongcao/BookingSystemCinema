<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="layout/header :: head"></th:block>
</head>
<body>
    <th:block th:replace="layout/header :: navbar"></th:block>

    <div class="container mt-4">
        <h2 class="mb-4"><i class="fas fa-fire text-primary me-2"></i>Now Showing</h2>
        
        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="movie : ${movies}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:src="${movie.posterUrl != null ? movie.posterUrl : 'https://via.placeholder.com/300x450?text=No+Poster'}" 
                         class="card-img-top" alt="Movie Poster" style="height: 400px; object-fit: cover;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-truncate" th:text="${movie.title}">Movie Title</h5>
                        <p class="card-text text-muted mb-2">
                            <i class="fas fa-clock me-1"></i><span th:text="${movie.duration + ' min'}">120 min</span><br>
                            <span class="badge bg-secondary mt-1">Action</span>
                            <span class="badge bg-danger mt-1">18+</span>
                        </p>
                        <a th:href="@{/movie/{id}(id=${movie.id})}" class="btn btn-primary mt-auto">Book Now</a>
                    </div>
                </div>
            </div>
            <div th:if="${movies.empty}" class="col-12">
                <p class="text-center text-muted">No movies available at the moment.</p>
            </div>
        </div>
    </div>

    <th:block th:replace="layout/footer :: footer"></th:block>
</body>
</html>
